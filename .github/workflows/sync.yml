name: Sync y Deploy

on:
  push:
    branches: [frontend, backend]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      # ─── FRONTEND ───────────────────────────────────────────────
      - name: Build Vue
        if: github.ref_name == 'frontend'
        run: |
          npm install
          npm run build

      - name: Copiar dist a master/public
        if: github.ref_name == 'frontend'
        run: |
          git checkout master
          rm -rf public/*
          cp -r dist/* public/
          git add public/
          git diff --staged --quiet || git commit -m "sync: build frontend → master/public"
          git push origin master

      # ─── BACKEND ────────────────────────────────────────────────
      - name: Sync backend a master
        if: github.ref_name == 'backend'
        run: |
          git checkout master

          # Traer archivos del backend UNO POR UNO, sin merge
          git checkout origin/backend -- .

          # Restaurar public/ desde master para no pisarlo
          git checkout HEAD -- public/ || true

          git add -A
          git diff --staged --quiet || git commit -m "sync: backend → master"
          git push origin master